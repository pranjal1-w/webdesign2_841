<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop+ Pro</title>

<link rel="stylesheet" href="amazonstyle.css">
</head>

<body>

<header class="navbar">

<div class="logo" onclick="showPage('home')">
Shop+
</div>

<div class="search-container">
<input id="search" placeholder="Search products..." oninput="renderProducts()">
</div>

<div class="nav-links">
<span onclick="showPage('home')">Home</span>
<span onclick="showPage('cart')">Cart 🛒 (<span id="cartCount">0</span>)</span>
</div>

</header>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>Big Deals, Better Life</h1>
<p>Explore trending electronics, fashion & gadgets</p>
<button onclick="document.getElementById('home').scrollIntoView({behavior:'smooth'})">
Shop Now
</button>
</div>
</section>

<!-- HOME -->
<section id="home" class="page">
<div class="products" id="productContainer"></div>
</section>

<!-- CART -->
<section id="cart" class="page hidden">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="total-box">
<h3>Total: ₹<span id="totalPrice">0</span></h3>

<button onclick="checkout()">
Checkout
</button>

</div>

</section>

<script src="app.js"></script>

</body>
</html>
