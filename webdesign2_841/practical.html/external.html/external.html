<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Interest Calculator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f4f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background: white;
        padding: 30px 40px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        width: 320px;
    }
    h2 {
        text-align: center;
        color: #333;
    }
    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
        color: #444;
    }
    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
    }
    button {
        margin-top: 20px;
        width: 100%;
        padding: 10px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover {
        background: #1e40af;
    }
    #result {
        margin-top: 20px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #16a34a;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Simple Interest Calculator</h2>

    <label for="principal">Principal (₹)</label>
    <input type="number" id="principal" placeholder="Enter principal amount">

    <label for="rate">Rate of Interest (%)</label>
    <input type="number" id="rate" placeholder="Enter rate">

    <label for="time">Time (Years)</label>
    <input type="number" id="time" placeholder="Enter time">

    <button onclick="calculateSI()">Calculate</button>

    <div id="result"></div>
</div>

<script>
    function calculateSI() {
        // Step 1: input values lena
        let p = parseFloat(document.getElementById("principal").value);
        let r = parseFloat(document.getElementById("rate").value);
        let t = parseFloat(document.getElementById("time").value);

        let resultDiv = document.getElementById("result");

        // Step 2: validation - agar koi field empty ya invalid hai
        if (isNaN(p) || isNaN(r) || isNaN(t)) {
            resultDiv.style.color = "red";
            resultDiv.innerHTML = "Please enter valid numbers in all fields.";
            return;
        }

        // Step 3: Simple Interest formula -> SI = (P * R * T) / 100
        let si = (p * r * t) / 100;

        // Step 4: Total amount bhi nikal lete hain (extra touch)
        let totalAmount = p + si;

        // Step 5: result dikhana
        resultDiv.style.color = "#16a34a";
        resultDiv.innerHTML = `Simple Interest = ₹${si.toFixed(2)}<br>Total Amount = ₹${totalAmount.toFixed(2)}`;
    }
</script>

</body>
</html>
